version: 1
entries:
  - id: win_node_bin_zero_exe_shim
    title: Windows 下 node_modules/.bin 的 0 字节 .exe 占位 shim
    tags: ["windows", "node", "tooling", "bin", "shim"]
    patterns:
      - "node_modules[\\\\/]\\.bin[\\\\/].+\\.exe"
      - "0-byte|0 byte|spawn\\s+.+\\s+UNKNOWN|No valid .* binary found"
    actions:
      - "不要直接执行/校验 `node_modules/.bin/<tool>.exe`（可能是 0 字节占位）。优先 `npm run <script>` / `npx <tool>`，或在 Windows 上改用 `<tool>.cmd`。"
      - "如果脚本里硬编码了 `<tool>.exe`：把它替换为 `<tool>.cmd`（让 cmd shim 去定位真实二进制）。"
      - "如果 `node_modules/.bin/<tool>.exe` 根本不存在但 `<tool>.cmd` 存在：这通常也是 npm 在 Windows 的正常布局；脚本应优先使用 `<tool>.cmd`。"

  - id: node_redeclare_dirname_filename
    title: Node CommonJS 中重复声明 __dirname/__filename 导致 SyntaxError
    tags: ["node", "cjs", "syntaxerror"]
    patterns:
      - "SyntaxError: Identifier '__dirname' has already been declared|SyntaxError: Identifier '__filename' has already been declared"
    actions:
      - "在 CommonJS 下，`__dirname`/`__filename` 已由 Node 提供；删除脚本里 `const __dirname = ...` / `const __filename = ...` 的重复声明即可。"
      - "如果项目是 ESM（package.json: type=module），不要用 `__dirname`；用 `import.meta.url` + `fileURLToPath()` 计算目录并使用不同变量名（不要叫 `__dirname`）。"

  - id: win_npm_bin_shim_cmd_ps1
    title: Windows 下 npm 工具 shim：优先使用 .cmd/.ps1，而不是 .exe/无后缀
    tags: ["windows", "node", "npm", "tooling", "shim"]
    patterns:
      - "node_modules[\\\\/](?:\\.bin|bin)[\\\\/].+(?:\\.exe)?"
      - "No valid .* binary found|binary found but is 0-byte|0-byte|spawn\\s+.+\\s+UNKNOWN"
    actions:
      - "Windows/npm 往往只保证 `node_modules/.bin/<tool>.cmd`/`<tool>.ps1` 可用；`.exe` 可能不存在或是 0 字节占位。"
      - "脚本不要 `spawn('.../.bin/<tool>.exe')` 或用 `stat.size>0` 去“验真”；优先执行 `<tool>.cmd`，或直接用 `npm exec -- <tool>` / `npx <tool>`。"
      - "如果脚本同时有 `node_modules/.bin/` 和 `bin/` 手动回退：只把 `.bin` 那段改成 `.cmd`，`bin/` 回退保持原二进制扩展名。"
      - "如果脚本写成了 `node_modules/bin/<tool>.exe`（缺少点）：改为 `node_modules/.bin/<tool>.cmd`。"

  - id: hugo_bin_vendor_fallback
    title: hugo-bin 在 Windows 下的 vendor 二进制回退（避免 .bin/.exe 入口坑）
    tags: ["windows", "node", "hugo", "hugo-bin", "tooling"]
    patterns:
      - "No valid Hugo binary found|Hugo binary found but is 0-byte"
      - "hugo-bin"
      - "node_modules[\\\\/](?:\\.bin|bin)[\\\\/]hugo\\.exe"
    actions:
      - "优先入口：`node_modules/.bin/hugo.cmd`（由 npm shim 调用 `hugo-bin/bin/cli.js`，再定位真实二进制）。"
      - "如果项目脚本硬编码检查 `node_modules/.bin/hugo.exe`：不要做 size>0 校验；改为优先 `.cmd`，并在 Windows 下增加 vendor 回退：`node_modules/hugo-bin/vendor/hugo.exe`。"
      - "紧急但不推荐：如果你必须满足某个脚本只认 `.bin/hugo.exe`，可把 `node_modules/hugo-bin/vendor/hugo.exe` 复制到 `node_modules/.bin/hugo.exe`（注意：重新 `npm install` 可能覆盖，最好改脚本或加 postinstall）。"
